name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.34

      - run: bun install --frozen-lockfile
        continue-on-error: true # first-run before lockfile exists

      - run: bun run lint

      - run: bun run check

      - run: bun run build
